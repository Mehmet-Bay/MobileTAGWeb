        <link rel="icon" type="image/png" href="drawable/mobile_tag_logo.png">
        <style>
                body {
                    border-radius: 10px; 
                    border: 1px outset #ffaa00;
                    box-shadow: 0 0 15px;
                    background-color: #000000;
                    color: #FFBF00;
                }
                header {
                    text-align: center;                    
                }
                h1 {
                    margin: 0;
                    font-size: 8vw;
                    -webkit-text-fill-color: antiquewhite;
                    text-shadow: 0 0 10px #FFBF00;
                }
                a {
                    color: #000000;
                    text-decoration: none;
                    margin: 0 20px;
                    font-size: 2.5vw;
                    font-weight: bold;
                    transition: color 0.3s ease;
                }
                p {
                    color: #000000;
                    text-decoration: none;
                    margin: 0 20px;
                    font-size: 2vw;
                    
                    transition: color 0.3s ease;
                }
                .adsbygoogle {
                    background: #eee;
                    border: 1px dashed #999;
                }
                .mobile-menu-btn {
                    align-self: center;
                    background: none;
                    border: none;
                    color: #ffbf00;
                    font-size: clamp(5px, 2vw, 30px);
                    font-weight: bold;
                    cursor: pointer;
                }
                nav {
                    display: flex;
                    justify-content: center;
                    width: 100%;
                    background-color: #FFBF00;
                    padding-left: 1%;
                    padding-right: 1%;
                    }
                nav a {
                    color: #000000;
                    text-decoration: none;
                    margin: 0 1vw;
                    font-size: clamp(10px, 2vw, 50px);
                    font-weight: bold;
                    transition: color 0.3s ease;
                }
                nav a:hover {
                    color: #ffffff;
                    flex-wrap: wrap;
                }
                    .dropdown {
                    position: relative;
                    display: flex;            
                }
                .dropdown-content {
                    display: none;
                    position: absolute;
                    background-color: #FFBF00;
                    box-shadow: 0vw 0.8vw 1.6vw rgba(0,0,0,0.3);
                    z-index: 1;
                }
                .dropdown-content a {
                    color: #000000;
                    padding: 1vw 1.6vw;
                    text-decoration: none;
                    display: flex;
                    font-size: 2vw;
                }
                .dropdown-content a:hover {
                    background-color: transparent;
                    color: #fff;
                }    
                .dropdown:hover .dropdown-content {
                    display: block;
                } 
                .mobile-menu-btn {
                    display: none;
                    background: none;
                    border: none;
                    font-size: 28px;
                    font-weight: bold;
                    cursor: pointer;
                    color: black;
                }
                .nav-wrapper {
                    display: flex;
                    justify-content: center;
                }
                @media (max-width: 393px) {
                    .dropdown .dropdown-content {
                        display: none;
                        margin-left: 10px;
                    }
                    .dropdown.open .dropdown-content {
                        display: block;
                    }
                    nav {
                        position: relative;
                        justify-content: flex-end;
                    }
                    .mobile-menu-btn {
                        display: block;
                        padding-right: 3%;
                        font-size: 15px;
                        background: none;
                        border: none;
                    }
                    .nav-wrapper {
                        position: absolute;
                        top: 100%;
                        right: 5px;
                        background: #FFBF00;
                        border-radius: 10px;
                        box-shadow: 0 8px 20px rgba(0,0,0,.35);
                        flex-direction: column;
                        padding: 10px 15px;
                        min-width: 200px;
                        opacity: 0;
                        transform: translateY(-10px);
                        pointer-events: none;
                        transition: opacity .25s ease, transform .25s ease;
                    }
                    nav.open .nav-wrapper {
                        opacity: 1;
                        transform: translateY(0);
                        pointer-events: auto;
                    }
                    .nav-wrapper a,
                    .nav-wrapper .dropdown {
                        padding: 8px 0;
                        display: flex;
                    }
                    .dropdown-content {
                        position: static;
                        box-shadow: none;
                    }
                }
                html, body {
                    width: 100%;
                    max-width: 100%;
                    overflow-x: hidden;
                }
        </style>
    </head>
        <script>
            async function loadTermsTexts() {
                try {
                    const response = await fetch("en.json");
                    const data = await response.json();
                    const textBreaker = data.termsInfo.replace(/\n/g, "<br>");
                    document.getElementById("nav-termsInfo").innerHTML = textBreaker;
                    document.getElementById("nav-terms").textContent = data.terms;
                } catch (error) {
                    console.error("Fel vid laddning av navtexts.json:", error);
                }
            }
            loadTermsTexts();
        </script>
    <body>
        <header>
            <!--<h1 class="centered-title">Mobile-TAG</h1>-->
            <img src="drawable/nylogo.png" style="max-width: 100%;">
            <nav style="margin-top: 3%;">
                <button class="mobile-menu-btn" onclick="toggleMobileNav()">☰ Menu</button>
                <div class="nav-wrapper">
                <a href="/">Main Page</a>
                <div class="dropdown mobile-dropdown">
                    <div class="dropdown">
                    <a id="infoCondition">Resources</a>

                        <a href="/languages.html">Supported Languages</a>
                        <a href="/accident.html">Accidents</a>

                    </div>
                    </div>
                </div>
                <a href="/about.html">About</a>
                <a href="/companies.html">Companies</a>
                <a href="/qrcodegen.html">QR Code Generator</a>
                <div class="dropdown">
                    <a href="#">Terms & Privacy</a>
                    <div class="dropdown-content">
                    <a style="pointer-events: none; opacity: 0.5;">Terms of Mobile-TAG</a>
                    <a href="/privacy.html">Privacy & Integrity policies</a>
                    </div>
                </div>
                <a href="/contact.html">Contact us</a>
                </div>
            </nav>
        </header>
        <section id="terms" style="padding:40px; display:flex; justify-content:center;">
            <div style="background-color:#cbc8c8; max-width:800px; padding:30px; border-radius:10px; border: 1px outset #ffaa00; box-shadow: 0 0 15px; border-radius: 10px; padding: 10px;">
                <div>
                    <header class="center">
                        <h2 id="nav-terms" href="#" style="color: #000000; text-decoration: none; margin: 0 20px; font-size: clamp(20px, 2.5vw, 30px); font-weight: bold; transition: color 0.3s ease;"></h2>
                    </header>
                    <br>
                <p id="nav-termsInfo" href="#" style="font-size: clamp(15px, 1.6vw, 20px);"></p>
                </div>
                <!-- test element19-->

            </div>
        </section>
          <script>
            function toggleMobileNav() {
            document.querySelector("nav").classList.toggle("open");
            }
            document.querySelectorAll(".dropdown > a").forEach(trigger=>{
            trigger.addEventListener("click", function(e){
                if(window.innerWidth <= 768){
                e.preventDefault();
                this.parentElement.classList.toggle("open");
                }
            });
            });
            document.querySelectorAll(".nav-wrapper a").forEach(a=>{
            a.addEventListener("click",()=>{
                if(!a.parentElement.classList.contains("dropdown")){
                document.querySelector("nav").classList.remove("open");
                }
            });
            });
        </script>
    </body>
